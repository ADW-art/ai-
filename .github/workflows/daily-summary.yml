name: Daily Horizon Summary

on:
  schedule:
    # GitHub scheduled workflows use UTC. 20:00 UTC is 04:00 Asia/Shanghai;
    # this intentionally runs early to offset the observed schedule delay.
    - cron: '0 22 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: windows-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          PYTHONIOENCODING: utf-8
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: python -m src.main

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Commit summaries to repo
        run: |
          mkdir -p summaries
          cp data/summaries/*.md summaries/
          git config user.name "Horizon Bot"
          git config user.email "horizon-bot@users.noreply.github.com"
          git add summaries/
          git commit -m "Add daily summaries for ${{ env.DATE }}" || echo "No new summaries"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
